<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">财报总览</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Crect x='4' y='20' width='6' height='8' rx='1.5' fill='white' opacity='.9'/%3E%3Crect x='13' y='13' width='6' height='15' rx='1.5' fill='white' opacity='.9'/%3E%3Crect x='22' y='6' width='6' height='22' rx='1.5' fill='white' opacity='.9'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --blue:#2563eb;--blue-lt:#dbeafe;--green:#059669;--green-lt:#d1fae5;
  --red:#dc2626;--red-lt:#fee2e2;--orange:#d97706;--orange-lt:#fef3c7;
  --purple:#7c3aed;--purple-lt:#ede9fe;--r:12px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.page{max-width:1200px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:700}
.header p{color:var(--muted);font-size:13px;margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
#refreshTime{font-size:12px;color:var(--muted)}
.btn{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:not-allowed}
.lang-btn{background:transparent;border:1px solid var(--border);padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.lang-btn:hover{border-color:var(--blue);color:var(--blue)}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-bar{height:3px;background:var(--blue-lt);border-radius:2px;overflow:hidden;margin-bottom:20px;display:none}
.loading-bar.active{display:block}
.loading-bar::after{content:'';display:block;height:100%;width:30%;background:var(--blue);animation:slide 1.2s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(433%)}}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--border)}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:700}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:4px}
.red{color:var(--red)}.green{color:var(--green)}.blue{color:var(--blue)}.orange{color:var(--orange)}.purple{color:var(--purple)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.bg-red{background:var(--red-lt);color:var(--red)}.bg-green{background:var(--green-lt);color:var(--green)}
.bg-blue{background:var(--blue-lt);color:var(--blue)}.bg-orange{background:var(--orange-lt);color:var(--orange)}
/* Charts */
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:24px}
.card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px}
.chart-wrap canvas{max-height:260px}
/* Monthly sections */
.section-header{font-size:16px;font-weight:700;color:var(--text);margin:28px 0 14px;padding-left:2px;border-left:4px solid var(--blue);padding-left:10px}
.monthly-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:24px}
.month-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--border)}
.month-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.month-card-title{font-size:15px;font-weight:700}
.stat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.stat-row:last-child{border:none}
.stat-label{color:var(--muted)}
.stat-value{font-weight:600;text-align:right}
.prog{height:4px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden;width:90px}
.prog-fill{height:100%;border-radius:2px}
.divider{height:1px;background:var(--border);margin:6px 0}
/* Transactions */
.txn-section{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--border)}
.txn-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tabs{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:8px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
.tab.active{background:var(--card);color:var(--text);box-shadow:var(--sh)}
.srch{position:relative}
.srch input{padding:6px 10px 6px 28px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);outline:none;width:190px}
.srch input:focus{border-color:var(--blue)}
.srch-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f8fafc;white-space:nowrap}
tr:hover td{background:#f8fafc}
tr:last-child td{border:none}
.cat{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.c0{background:var(--blue-lt);color:var(--blue)}.c1{background:var(--orange-lt);color:var(--orange)}.c2{background:var(--purple-lt);color:var(--purple)}
.txn-count{font-size:12px;color:var(--muted)}
.msg{color:var(--muted);font-size:13px;padding:30px;text-align:center}
.err{color:var(--red);font-size:13px;padding:20px;text-align:center}
@media(max-width:768px){
  .charts-row{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .monthly-grid{grid-template-columns:1fr}
}
</style>
</head>

<script>
const SID = '1HKvW-0EbJDzXVPzvk-LiKyk7JLzeBklhPegPIZJYI8A';
const INR_RATE = 93.25;
// All possible month sheets to try — dynamically expands as new sheets are added
const ALL_MONTHS = ['3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let monthlyData = []; // [{ name, summary, txns }]
let allTxns = [];
let activeTab = 'all';
let barChart = null, donutChart = null;
let currentLang = 'zh';

// ── Translations ─────────────────────────────────────────────────────────────
const T = {
  zh: {
    htmlLang:'zh-CN', pageTitle:'财报总览', h1:'📊 财报总览',
    subtitle: m => `数据实时同步自 Google Sheets · ${m}`,
    refreshBtn:'刷新数据', langToggle:'EN',
    loadingText:'加载中…', loadFailed:'加载失败',
    kpiExp:'累计总支出', kpiExpSub:'所有月份合计',
    kpiRev:'总平台收入', kpiRevSub:'所有月份合计',
    kpiNet:'累计净亏损', kpiNetSub:'收入 − 支出',
    kpiAds:'广告投放', kpiAdsSub:'最新月份广告 ROI',
    kpiBurn:'日均烧钱', kpiBurnSub:'已运营天数均摊',
    kpiHR:'人员成本占比', kpiHRSub:'最新月份人员 / 总支出',
    roiSub: r => `ROI ${r}%  (收入/广告支出)`,
    roiNoData:'暂无收入数据',
    burnSuffix:'/天',
    updatedAt: t => `更新于 ${t}`,
    chartBarTitle:'📈 月度损益对比',
    chartDonutTitle: m => `🥧 ${m}支出结构`,
    monthlySectionHeader:'📅 各月收支明细',
    statsLabels:['项目支出','投放支出','人员支出','总支出','平台收入','净利润'],
    txnTitle:'📋 全部交易明细',
    records:'条记录',
    tabAll:'全部',
    searchPH:'搜索明细…',
    thDate:'日期', thMonth:'月份', thCat:'支出类别', thDetail:'明细',
    thCur:'原币', thOrig:'原币金额', thUSD:'美金 (USD)',
    thINR:'平台收入 (INR)', thNet:'当日净额',
    catMap:{'项目支出':'项目支出','投放支出':'投放支出','人员支出':'人员支出'},
    noData:'暂无匹配数据',
    errPrefix:'数据加载失败：',
    errSuffix:'（请确认表格已设为"任何人可查看"）',
  },
  en: {
    htmlLang:'en', pageTitle:'Financial Report', h1:'📊 Financial Report',
    subtitle: m => `Real-time sync from Google Sheets · ${m}`,
    refreshBtn:'Refresh', langToggle:'中文',
    loadingText:'Loading…', loadFailed:'Load failed',
    kpiExp:'Total Expenses', kpiExpSub:'All months combined',
    kpiRev:'Platform Revenue', kpiRevSub:'All months combined',
    kpiNet:'Net Loss', kpiNetSub:'Revenue − Expenses',
    kpiAds:'Ad Spend', kpiAdsSub:'Latest month ROI',
    kpiBurn:'Daily Burn', kpiBurnSub:'Avg. over operating days',
    kpiHR:'Headcount %', kpiHRSub:'Latest month headcount / expenses',
    roiSub: r => `ROI ${r}%  (Revenue / Ad Spend)`,
    roiNoData:'No revenue data yet',
    burnSuffix:'/day',
    updatedAt: t => `Updated at ${t}`,
    chartBarTitle:'📈 Monthly P&L Comparison',
    chartDonutTitle: m => `🥧 ${m} Expense Structure`,
    monthlySectionHeader:'📅 Monthly Breakdown',
    statsLabels:['Project','Ad Spend','Headcount','Total Expenses','Platform Revenue','Net Profit'],
    txnTitle:'📋 All Transactions',
    records:'records',
    tabAll:'All',
    searchPH:'Search…',
    thDate:'Date', thMonth:'Month', thCat:'Category', thDetail:'Detail',
    thCur:'Currency', thOrig:'Orig. Amount', thUSD:'USD',
    thINR:'Platform Rev (INR)', thNet:'Daily Net',
    catMap:{'项目支出':'Project','投放支出':'Ad Spend','人员支出':'Headcount'},
    noData:'No matching data',
    errPrefix:'Failed to load: ',
    errSuffix:' (Ensure the sheet is set to "Anyone can view")',
  }
};

function l() { return T[currentLang]; }

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  applyLang();
}

function applyLang() {
  const t = l();
  document.getElementById('html-root').lang = t.htmlLang;
  document.getElementById('page-title').textContent = t.pageTitle;
  document.getElementById('header-h1').textContent = t.h1;
  document.getElementById('refresh-btn-text').textContent = t.refreshBtn;
  document.getElementById('langToggle').textContent = t.langToggle;
  document.getElementById('kpi-label-exp').textContent = t.kpiExp;
  document.getElementById('kpi-sub-exp').textContent = t.kpiExpSub;
  document.getElementById('kpi-label-rev').textContent = t.kpiRev;
  document.getElementById('k-rev-sub').textContent = t.kpiRevSub;
  document.getElementById('kpi-label-net').textContent = t.kpiNet;
  document.getElementById('kpi-sub-net').textContent = t.kpiNetSub;
  document.getElementById('kpi-label-ads').textContent = t.kpiAds;
  document.getElementById('k-ads-sub').textContent = t.kpiAdsSub;
  document.getElementById('kpi-label-burn').textContent = t.kpiBurn;
  document.getElementById('kpi-sub-burn').textContent = t.kpiBurnSub;
  document.getElementById('kpi-label-hr').textContent = t.kpiHR;
  document.getElementById('kpi-sub-hr').textContent = t.kpiHRSub;
  document.getElementById('chart-bar-title').textContent = t.chartBarTitle;
  document.getElementById('txn-title').textContent = t.txnTitle;
  document.getElementById('th-date').textContent = t.thDate;
  document.getElementById('th-month').textContent = t.thMonth;
  document.getElementById('th-cat').textContent = t.thCat;
  document.getElementById('th-detail').textContent = t.thDetail;
  document.getElementById('th-cur').textContent = t.thCur;
  document.getElementById('th-orig').textContent = t.thOrig;
  document.getElementById('th-usd').textContent = t.thUSD;
  document.getElementById('th-inr').textContent = t.thINR;
  document.getElementById('th-net').textContent = t.thNet;
  document.getElementById('searchInput').placeholder = t.searchPH;
  if (monthlyData.length > 0) {
    renderKPIs();
    renderMonthlyCards();
    renderCharts();
    renderTable();
  }
}

// ── Data helpers ──────────────────────────────────────────────────────────────
async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&headers=0`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const txt = await r.text();
  const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
  if (!m) throw new Error('parse error');
  const j = JSON.parse(m[1]);
  return j.table.rows.map(row => row.c.map(c => c ? c.v : null));
}

async function safeSheet(name) {
  try { return await fetchSheet(name); } catch(e) { return null; }
}

function num(v) {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return v;
  return parseFloat(String(v).replace(/[$,¥₹\s]/g,'')) || 0;
}

function usd(n, sign) {
  const a = Math.abs(n);
  const s = '$' + a.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (n < 0) return '-' + s;
  if (sign && n > 0) return '+' + s;
  return s;
}

function inrFmt(n) {
  if (!n) return '—';
  const a = Math.abs(n);
  return (n<0?'-':'+') + '₹' + a.toLocaleString('en-IN',{maximumFractionDigits:0});
}

function gvizDate(v) {
  if (!v) return null;
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) return `${parseInt(m[2]) + 1}月${parseInt(m[3])}日`;
  return /\d+月\d+日/.test(String(v)) ? String(v) : null;
}

// Parses summary rows (rows where both col A and col B are null).
// Sheet structure (last 6 null-row entries):
//   n-6: project cost  (col F = index 5)
//   n-5: ad spend      (col F = index 5)
//   n-4: personnel     (col F = index 5)
//   n-3: revenue       (col F = index 5, USD value)
//   n-2: total expense (col F = index 5)
//   n-1: net income    (col F = index 5)
function parseSummary(rows, name) {
  const subs = rows.filter(r =>
    (r[0] === null || r[0] === undefined) &&
    (r[1] === null || r[1] === undefined));
  const n = subs.length;
  if (n < 6) return null;
  const proj   = Math.abs(num(subs[n-6][5]));
  const ads    = Math.abs(num(subs[n-5][5]));
  const hr     = Math.abs(num(subs[n-4][5]));
  const revUSD = Math.abs(num(subs[n-3][5]));
  const total  = Math.abs(num(subs[n-2][5]));
  const net    = num(subs[n-1][5]);
  return { name, proj, ads, hr, revUSD, total, net };
}

const KNOWN_CATS = new Set(['项目支出','投放支出','人员支出']);

function parseTxns(rows, month) {
  const out = [];
  let ld = '';
  for (const r of rows) {
    const d = gvizDate(r[0]);
    if (d) ld = d;
    const cat = r[1] ? String(r[1]).trim() : '';
    if (KNOWN_CATS.has(cat)) {
      out.push({ month, date: ld, cat,
        detail: r[2]||'', cur: r[3]||'USD',
        orig: num(r[4]), usd: Math.abs(num(r[5])),
        inrRev: num(r[7]), net: num(r[8]) });
    }
  }
  return out;
}

function set(id, v) { const el = document.getElementById(id); if(el) el.textContent = v; }

// ── Render ────────────────────────────────────────────────────────────────────
function renderKPIs() {
  const t = l();
  const totExp = monthlyData.reduce((s, m) => s + m.summary.total, 0);
  const totRev = monthlyData.reduce((s, m) => s + m.summary.revUSD, 0);
  const net = totRev - totExp;
  const latest = monthlyData[monthlyData.length - 1].summary;
  const roi = latest.ads > 0 ? (latest.revUSD / latest.ads * 100).toFixed(1) : null;
  // Estimate operating days: assume ~30 days per month
  const opDays = monthlyData.length * 30;
  const burn = totExp / opDays;
  const hrPct = latest.total > 0 ? (latest.hr / latest.total * 100).toFixed(1) : '—';

  set('k-exp', usd(totExp));
  set('k-rev', usd(totRev));
  set('k-net', usd(net));
  set('k-ads', usd(latest.ads));
  document.getElementById('k-ads-sub').textContent = roi ? t.roiSub(roi) : t.roiNoData;
  set('k-burn', usd(burn) + t.burnSuffix);
  set('k-hr', hrPct + '%');

  // Update subtitle with month range
  const names = monthlyData.map(m => m.summary.name);
  const range = names.length > 1 ? `${names[0]}–${names[names.length-1]}` : names[0];
  document.getElementById('header-subtitle').textContent = t.subtitle(`2026年${range}`);
}

function renderMonthlyCards() {
  const t = l();
  const grid = document.getElementById('monthly-grid');
  const header = document.getElementById('monthly-section-header');

  if (monthlyData.length === 0) { grid.innerHTML = ''; header.style.display = 'none'; return; }
  header.style.display = 'block';
  header.textContent = t.monthlySectionHeader;

  grid.innerHTML = monthlyData.map(({ summary: s }) => {
    const net = s.revUSD - s.total;
    const netColor = net >= 0 ? '#059669' : '#dc2626';
    const netBadgeClass = net >= 0 ? 'bg-green' : 'bg-red';

    function row(label, value, color, prog) {
      return `<div class="stat-row">
        <span class="stat-label">${label}</span>
        <div class="stat-value" style="color:${color}">
          ${value}
          ${prog > 0 ? `<div class="prog"><div class="prog-fill" style="width:${Math.min(100, prog*100).toFixed(0)}%;background:${color}"></div></div>` : ''}
        </div>
      </div>`;
    }

    return `<div class="month-card">
      <div class="month-card-header">
        <span class="month-card-title">📅 ${s.name}</span>
        <span class="badge ${netBadgeClass}">${usd(net, true)}</span>
      </div>
      <div>
        ${row(t.statsLabels[0], usd(s.proj), '#2563eb', s.total ? s.proj/s.total : 0)}
        ${row(t.statsLabels[1], usd(s.ads),  '#d97706', s.total ? s.ads/s.total  : 0)}
        ${row(t.statsLabels[2], usd(s.hr),   '#7c3aed', s.total ? s.hr/s.total   : 0)}
        <div class="divider"></div>
        ${row(t.statsLabels[3], usd(s.total), '#0f172a', 0)}
        ${row(t.statsLabels[4], usd(s.revUSD), '#059669', 0)}
        ${row(t.statsLabels[5], usd(net, true), netColor, 0)}
      </div>
    </div>`;
  }).join('');
}

function renderCharts() {
  const t = l();
  const names = monthlyData.map(m => m.summary.name);
  const latest = monthlyData[monthlyData.length - 1].summary;

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('chartBar'), {
    type: 'bar',
    data: {
      labels: names,
      datasets: [
        { label: t.statsLabels[0], data: monthlyData.map(m => m.summary.proj), backgroundColor:'#93c5fd', borderRadius:4 },
        { label: t.statsLabels[1], data: monthlyData.map(m => m.summary.ads),  backgroundColor:'#fcd34d', borderRadius:4 },
        { label: t.statsLabels[2], data: monthlyData.map(m => m.summary.hr),   backgroundColor:'#c4b5fd', borderRadius:4 },
        { label: t.statsLabels[4], data: monthlyData.map(m => m.summary.revUSD),
          type:'line', borderColor:'#059669', backgroundColor:'rgba(5,150,105,.15)',
          pointBackgroundColor:'#059669', tension:.3, fill:true, borderWidth:2, yAxisID:'y' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:true,
      scales: { x:{ stacked:true }, y:{ stacked:true, ticks:{ callback: v => '$'+v.toLocaleString() } } },
      plugins: {
        legend:{ position:'bottom', labels:{ boxWidth:12, padding:12 } },
        tooltip:{ callbacks:{ label: ctx => ctx.dataset.label + ': ' + usd(ctx.raw) } }
      }
    }
  });

  document.getElementById('chart-donut-title').textContent = t.chartDonutTitle(latest.name);

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('chartDonut'), {
    type: 'doughnut',
    data: {
      labels: [t.statsLabels[0], t.statsLabels[1], t.statsLabels[2]],
      datasets: [{
        data: [latest.proj, latest.ads, latest.hr],
        backgroundColor: ['#3b82f6','#f59e0b','#8b5cf6'],
        borderWidth: 2, borderColor: '#fff', hoverOffset: 6
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:true, cutout:'62%',
      plugins: {
        legend:{ position:'bottom', labels:{ boxWidth:12, padding:10 } },
        tooltip:{ callbacks:{
          label: ctx => {
            const pct = latest.total > 0 ? (ctx.raw/latest.total*100).toFixed(1) : 0;
            return ctx.label + ': ' + usd(ctx.raw) + ' (' + pct + '%)';
          }
        }}
      }
    }
  });
}

function renderTabs() {
  const t = l();
  const container = document.getElementById('txn-tabs');
  const names = monthlyData.map(m => m.summary.name);
  container.innerHTML = `<button class="tab${activeTab==='all'?' active':''}" onclick="filterTab('all',this)">${t.tabAll}</button>` +
    names.map(name =>
      `<button class="tab${activeTab===name?' active':''}" onclick="filterTab('${name}',this)">${name}</button>`
    ).join('');
}

function filterTab(val, el) {
  activeTab = val;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable() {
  const t = l();
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let rows = allTxns.filter(tr =>
    (activeTab === 'all' || tr.month === activeTab) &&
    (!q || tr.date.includes(q) ||
      tr.cat.includes(q) ||
      (t.catMap[tr.cat]||'').toLowerCase().includes(q) ||
      tr.detail.toLowerCase().includes(q) ||
      tr.cur.toLowerCase().includes(q))
  );
  set('txn-count', rows.length + ' ' + t.records);
  const body = document.getElementById('txnBody');
  const msg  = document.getElementById('txnMsg');
  if (!rows.length) { body.innerHTML = ''; msg.style.display='block'; msg.textContent=t.noData; return; }
  msg.style.display = 'none';
  const catClass = { '项目支出':'c0', '投放支出':'c1', '人员支出':'c2' };
  body.innerHTML = rows.map(tr => `
    <tr>
      <td>${tr.date}</td>
      <td>${tr.month}</td>
      <td><span class="cat ${catClass[tr.cat]||'c0'}">${t.catMap[tr.cat]||tr.cat}</span></td>
      <td>${tr.detail}</td>
      <td>${tr.cur}</td>
      <td style="text-align:right">${tr.orig.toLocaleString()}</td>
      <td style="text-align:right;font-weight:600">${usd(tr.usd)}</td>
      <td style="text-align:right;color:${tr.inrRev>0?'var(--green)':tr.inrRev<0?'var(--red)':'var(--muted)'}">${inrFmt(tr.inrRev)}</td>
      <td style="text-align:right;color:${tr.net>0?'var(--green)':tr.net<0?'var(--red)':'var(--muted)'}">
        ${tr.net !== 0 ? usd(tr.net, true) : '—'}
      </td>
    </tr>`).join('');
}

// ── Main load ─────────────────────────────────────────────────────────────────
async function loadAll() {
  const t = l();
  const btn  = document.getElementById('btnRefresh');
  const icon = document.getElementById('refreshIcon');
  const bar  = document.getElementById('loadingBar');
  btn.disabled = true; icon.className = 'spin'; icon.textContent = '↻';
  bar.className = 'loading-bar active';

  try {
    // Try all known months in parallel; only keep those that return valid data
    const results = await Promise.all(ALL_MONTHS.map(async name => {
      const rows = await safeSheet(name);
      if (!rows) return null;
      const summary = parseSummary(rows, name);
      if (!summary) return null;
      // Skip months with no data at all
      if (summary.total === 0 && summary.revUSD === 0) return null;
      const txns = parseTxns(rows, name);
      return { name, summary, txns };
    }));

    monthlyData = results.filter(Boolean);
    allTxns = monthlyData.flatMap(m => m.txns);

    if (monthlyData.length === 0) throw new Error('No sheet data found');

    renderKPIs();
    renderMonthlyCards();
    renderCharts();
    renderTabs();
    renderTable();
    set('refreshTime', t.updatedAt(new Date().toLocaleTimeString(currentLang==='zh'?'zh-CN':'en-US')));


  } catch(e) {
    console.error(e);
    const msgEl = document.getElementById('txnMsg');
    msgEl.style.display='block'; msgEl.className='err';
    msgEl.textContent = t.errPrefix + e.message + t.errSuffix;
    set('refreshTime', t.loadFailed);
  } finally {
    btn.disabled = false; icon.className = ''; icon.textContent = '↻';
    bar.className = 'loading-bar';
  }
}

loadAll();
</script>
</body>
</html>
